
buildscript {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.8.0'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.10'
        classpath 'com.google.dagger:hilt-android-gradle-plugin:2.55'
        classpath 'com.google.devtools.ksp:com.google.devtools.ksp.gradle.plugin:2.1.10-1.0.31'
        classpath 'org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.1.10'
        classpath 'org.jetbrains.kotlin:kotlin-serialization:2.1.10'
    }
}
// Top-level build file where you can add configuration options common to all sub-projects/modules.
plugins {
alias(libs.plugins.android.application) apply false
}